services:
  - type: web
    name: medicassist-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_BIN
        value: python3
      - key: WHISPER_MODEL_SIZE
        value: tiny.en
      - key: ENABLE_PYTHON_LLM
        value: "false"
      - key: CORS_ORIGIN
        value: http://localhost:8080,http://127.0.0.1:8080
